name: Daily Bolao Copa 2026 Email

on:
  schedule:
    # GitHub cron runs in UTC. 09:05 Asia/Dubai (UTC+4) = 05:05 UTC.
    - cron: "5 5 * * *"   # 09:05 Asia/Dubai (UTC+4)
  workflow_dispatch: {}     # lets you trigger a test run manually from the Actions tab

# Avoid overlapping runs if a previous one is still going.
concurrency:
  group: daily-bolao-email
  cancel-in-progress: false

# Needed so the keepalive step can push a commit.
permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate and send the daily email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          # Optional overrides (set as repo Variables, not Secrets, if you want):
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.mail.yahoo.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '465' }}
          EMAIL_TO: ${{ vars.EMAIL_TO || 'tiagosa@yahoo.com.br' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
        run: python scripts/send_daily_email.py

      - name: Keepalive commit (dodges GitHub's 60-day auto-disable of cron)
        if: always()
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-run.txt
          git commit -m "chore: keepalive [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push
