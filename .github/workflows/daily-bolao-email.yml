name: Daily Bolao Copa 2026 Email

on:
  schedule:
    # GitHub cron runs in UTC. 09:05 Asia/Dubai (UTC+4) = 05:05 UTC.
    - cron: "5 5 * * *"   # 09:05 Asia/Dubai (UTC+4)
  workflow_dispatch:        # lets you trigger a test run manually from the Actions tab
    inputs:
      window_hours:
        description: "Hours ahead to scope matches (daily default 36). Use a larger value to preview an upcoming match day."
        required: false
        default: "36"

# Avoid overlapping runs if a previous one is still going.
concurrency:
  group: daily-bolao-email
  cancel-in-progress: false

# Needed so the persistence step can push commits (predictions, log, keepalive).
permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate and send the daily email
        env:
          # Secrets are stored under custom names in this repo; map them to what the script expects.
          ANTHROPIC_API_KEY: ${{ secrets.SECRET_BOLAO }}
          SMTP_USER: ${{ secrets.SECRET_BOLAO_EMAIL }}
          SMTP_PASS: ${{ secrets.SECRET_BOLAO_EMAIL_PW }}
          # Config (repo Variables, with sane defaults). NOTE: correct recipient spelling.
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '465' }}
          EMAIL_TO: ${{ vars.EMAIL_TO || 'tiagogsa@yahoo.com.br' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
          # Scope window (hours ahead). Daily cron uses 36; a manual dispatch can widen it to preview a future match day.
          WINDOW_HOURS: ${{ inputs.window_hours || vars.WINDOW_HOURS || '36' }}
        run: python scripts/send_daily_email.py

      - name: Persist predictions + log, and keepalive (dodges 60-day cron auto-disable)
        if: always()
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A predictions log.md .github/last-run.txt 2>/dev/null || true
          git add .github/last-run.txt
          git commit -m "chore: daily picks + log + keepalive [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push
